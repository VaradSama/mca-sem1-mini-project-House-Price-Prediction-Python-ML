{% extends 'base.html' %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'admin_dashboard' %}">Admin Panel</a>
        <a href="{% url 'logout' %}" class="btn btn-outline-light">Logout</a>
    </div>
</nav>

<div class="container">
    <h2>Dashboard</h2>
    <div class="row mt-3">
        <div class="col-md-6">
            <div class="card shadow text-center mb-3">
                <div class="card-body">
                    <h3>{{ users_count }}</h3>
                    <p>Registered Users</p>
                    <a href="{% url 'admin_users' %}" class="btn btn-primary">Manage Users</a>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow text-center mb-3">
                <div class="card-body">
                    <h3>{{ predictions_count }}</h3>
                    <p>Total Predictions</p>
                    <a href="{% url 'admin_predictions' %}" class="btn btn-primary">View Predictions</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
