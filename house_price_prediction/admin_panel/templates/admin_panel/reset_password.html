{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Reset Password</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" placeholder="Enter registered email" class="form-control" required>
                        </div>
                       
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" name="newpassword" placeholder="Enter new password" class="form-control" required>
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" name="confirmpassword" placeholder="Re-enter new password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                    </form>
                    <p class="mt-3 text-center">
                        <a href="{% url 'login' %}">Login</a>
                    </p>

                    {% if messages %}
                        {% for msg in messages %}
                            <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
                        {% endfor %}
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
